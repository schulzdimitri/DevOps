services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: s07-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    image: jenkins/inbound-agent:latest
    container_name: s07-agent
    restart: unless-stopped
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_SECRET: f07b8514015a2caea6647b7796b29f965db589a929577cc0f38038ba8ecd7a60
      JENKINS_AGENT_NAME: s07-agent
    depends_on:
      - jenkins

  newman:
    image: postman/newman:latest
    container_name: s07-newman
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    volumes:
      - ./postman:/etc/newman

  nginx:
    image: nginx:latest
    container_name: s07-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - jenkins

volumes:
  jenkins_data: